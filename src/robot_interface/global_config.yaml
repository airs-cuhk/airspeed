# Active adaptors — all listed are started concurrently.
# Each path is relative to this interface directory and must contain
# a launch/start.sh script.
#
# NOTE: openarm-control-ros2-adaptor requires interactive calibration.
# Start it separately in its own terminal:
#   cd openarm/openarm-control-ros2-adaptor && bash launch/start.sh
adaptors:
  - "openarm/openarm-ik-ros2-adaptor"
